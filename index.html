<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bureaut</title>
  </head>
  <body>
    <div class="overflow-hidden">
      <section class="section h-screen">
        <div class="absolute right-8 top-6">
          <a href="https://github.com/EugeneYakovlev" class="text-sm" target="_blank" rel="noopener noreferrer">github</a>
        </div>
        <div class="grid grid-cols-2 h-full">
          <div>
            <div class="max-h-screen h-full relative overflow-hidden aspect-933/1440 ml-auto">
              <div class="h-full w-full overflow-hidden">
                <div class="absolute inset-0 w-full h-full" data-hover-distort>
                  <img src="./src/assets/BEZ08140-HDR.webp" class="object-cover object-center h-full min-h-full w-full" alt="Image 1" loading="eager" fetchpriority="high" data-scale-scroll data-scale-min="0.4" data-scale-max="2"/>
                  <img src="./src/assets/BEZ08140-HDR--before.webp" data-hover-to hidden alt=""/>
                </div>
              </div>
            </div>
          </div>
          <div class="self-center">
            <div class="aspect-square max-w-100 mx-auto overflow-hidden relative">
              <div class="h-full w-full overflow-hidden">
                <div class="absolute inset-0 w-full h-full" data-hover-distort>
                  <img src="./src/assets/BEZ08152-HDR-square.webp" class="object-cover object-center min-h-full h-full w-full" alt="Image 2" loading="eager" fetchpriority="high" data-scale-scroll data-scale-min="0.8" data-scale-max="1.25"/>
                  <img src="./src/assets/BEZ08152-HDR--before-square.webp" data-hover-to hidden alt=""/>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="absolute left-32 bottom-10 pointer-events-none z-30">
          <div class="title text-[clamp(3rem,17vw-1.3rem,16rem)] leading-none" data-scroll="3" data-scroll-lerp="0.25">balbek</div>
        </div>
      </section>
      <section class="section pt-80">
        <div class="absolute right-32 text-right top-20">
          <div class="title text-[clamp(3rem,17vw-1.3rem,16rem)] leading-none" data-scroll="1" data-scroll-lerp="0.15">bureau</div>
        </div>
        <div class="h-full flex items-end justify-center gap-8">
          <div class="w-[14vw] aspect-268/786 overflow-hidden relative" data-scroll="-4">
            <div class="w-full h-full absolute inset-0">
              <div class="h-full w-auto min-w-full max-w-none min-h-full overflow-hidden flex justify-center" data-scale-scroll data-scale-max="1.5">
                <img src="./src/assets/BEZ08676-HDR.webp" class="object-cover object-center w-auto min-h-full max-w-none h-full" alt="Image 3" loading="lazy"/>
                {# <img src="./src/assets/BEZ08676-HDR--before.webp" data-hover-to hidden /> #}
              </div>
            </div>
          </div>
          <div class="w-[17.5vw] aspect-336/668 overflow-hidden relative" data-scroll="-6" data-scroll-lerp="0.75">
            <div class="w-full h-full absolute inset-0">
              <div class="w-auto h-full overflow-hidden flex justify-center" data-scale-scroll data-scale-max="1.75">
                <img src="./src/assets/BEZ07975-HDR.webp" class="object-cover object-center h-full w-auto max-w-none" alt="Image 4" loading="lazy" />
              </div>
            </div>
          </div>
          <div class="w-[30.2vw] aspect-square overflow-hidden relative" data-scroll="-8" data-scroll-lerp="1.15">
            <div class="w-full h-full absolute inset-0">
              <div class="w-auto h-full overflow-hidden flex justify-center" data-scale-scroll data-scale-max="2">
                <img src="./src/assets/BEZ08597-HDR.webp" class="object-cover object-center min-h-full h-full w-auto max-w-none" alt="Image 5" loading="lazy" />
                {# <img src="./src/assets/BEZ08597-HDR--before.webp" data-hover-to hidden /> #}
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="section mt-20">
        <div class="relative z-10 flex items-start gap-x-4 justify-center h-full pl-20">
          <div class="w-[22.8125vw] aspect-438/878 overflow-hidden relative" data-scroll="-11" data-scroll-lerp="0.05">
            <div class="w-full h-full absolute inset-0" data-hover-distort>
              <div class="h-full min-w-full min-h-full overflow-hidden" data-scale-scroll data-scale-min="1" data-scale-max="1.75">
                <img src="./src/assets/BEZ08259-HDR.webp" class="object-cover object-center min-h-full h-full w-full" alt="Image 6" loading="lazy"/>
                <img src="./src/assets/BEZ08259-HDR--before.webp" data-hover-to hidden />
              </div>
            </div>
          </div>
          <div class="text-sm" data-scroll="0" data-scroll-lerp="-5">
            <div>Project area: 166 sq.m</div>
            <div>Project year: 2025</div>
            <div>Location: Kyiv, Ukraine</div>
          </div>
          
        </div>
        <div class="relative mt-[-18.5%] z-20">
          <div class="absolute z-10 inset-x-0 text-center top-20 pointer-events-none">
            <div class="title text-[clamp(3rem,17vw-1.3rem,16rem)] leading-none" data-scroll="-9" data-scroll-lerp="0.5">VSLKVSKA</div>
          </div>
          <div class="aspect-1920/680 relative w-full overflow-hidden" data-hover-distort>
            <div class="w-full overflow-hidden absolute inset-0 min-w-full" data-scale-scroll data-scale-min="1.75" data-scale-max="0.05">
              <img src="./src/assets/BEZ08152-HDR.webp" class="object-cover object-center h-auto min-w-full w-full max-w-none max-h-none" alt="Image 7" loading="lazy"/>
              <img src="./src/assets/BEZ08152-HDR--before.webp" data-hover-to hidden />
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
